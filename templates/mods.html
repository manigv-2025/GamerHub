{% extends "base.html" %}
{% block title %}GTA V Mods - GamerHub{% endblock %}
{% block content %}
<div class="container">
    <h1 style="color: #00d4ff;">GTA V Mods</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px;">
        {% for post in posts %}
        <div style="background: #1a1f3a; padding: 20px; border-radius: 8px; border: 2px solid #ff006e;">
            <h3 style="color: #ff006e;">{{ post.title }}</h3>
            <p style="color: #888; font-size: 14px;">{{ post.created_at.strftime('%Y-%m-%d') }}</p>
            <p>{{ post.description[:100] }}...</p>
            <a href="/article/{{ post.slug }}" style="color: #00d4ff; text-decoration: none;">View Mod →</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
